name: Devops_CI/CD

on:
  # workflow_dispatch:
    # Optional: You can add inputs here if you need to pass variables
    # inputs:
    #   environment:
    #     description: 'Environment to run against'
    #     required: true
    #     default: 'qa'
        
        #this one for automate when main branch marge
  pull_request:
    branches: [main]
    types: [closed]

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  BASE_DIR: /home/ubuntu/demo
  REPO_DIR: /home/ubuntu/demo/testing_git_hub
  REPO_URL: https://github.com/ajinkya2304/testing_git_hub.git

jobs:
  deploy:
    timeout-minutes: 10
    if: github.event.pull_request.merged == true
    runs-on: self-hosted

    steps:
      - name: Setup workspace
        run: |
          set -e
          mkdir -p "$BASE_DIR"
          if [ ! -d "$REPO_DIR/.git" ]; then
            echo "Cloning repo..."
            git clone "$REPO_URL" "$REPO_DIR"
            cd "$REPO_DIR"
            echo "---updating apt-get update--"
            sudo apt-get update > /dev/null 2>&1
            echo "---updating apt-get update successfull--"
            sudo apt install -y nodejs npm > /dev/null 2>&1
            sudo npm install > /dev/null 2>&1
            sudo chown -R ubuntu:ubuntu "$REPO_DIR"/node_modules
            sudo npm install -g pm2
          else
            echo "Updating repo..."
            cd "$REPO_DIR"
            git fetch origin
            git checkout -B main origin/main
            git reset --hard origin/main
            git clean -fd
            sudo npm install > /dev/null 2>&1
            sudo chown -R ubuntu:ubuntu "$REPO_DIR"/node_modules
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
               

      - name: Install dependencies
        run: |
          set -e
          cd "$REPO_DIR"
          sleep 10
          sudo -u ubuntu pm2 restart app --update-env || sudo -u ubuntu pm2 restart ecosystem.config.js --update-env

      
      - name: validation
        run: |
          set -e
          cd "$REPO_DIR"
          echo "PM2 process list:"
          pm2 list
          





