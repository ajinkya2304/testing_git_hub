name: Devops_CI/CD

on:
  pull_request:
    branches: [main]
    types: [closed]

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  BASE_DIR: /home/ubuntu/demo
  REPO_DIR: /home/ubuntu/demo/testing_git_hub
  REPO_URL: https://github.com/ajinkya2304/testing_git_hub.git

jobs:
  deploy:
    timeout-minutes: 10
    if: github.event.pull_request.merged == true
    runs-on: [self-hosted, qa]

    steps:
      - name: Setup workspace & code
        run: |
          set -e

          mkdir -p "$BASE_DIR"

          if [ ! -d "$REPO_DIR/.git" ]; then
            echo "Cloning repo..."
            git clone "$REPO_URL" "$REPO_DIR"
            rm -rf /home/ubuntu/.npm
            sudo apt-get update
            sudo apt install -y nodejs npm
            npm install -g pm2

          else
            echo "Updating repo..."
            cd "$REPO_DIR"
            git fetch origin
            git checkout -B main origin/main
            git reset --hard origin/main
            git clean -fd
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install dependencies & start app
        run: |
          set -e
          cd "$REPO_DIR"

          echo "Installing dependencies..."
          npm ci

          echo "Starting application with PM2..."
          pm2 restart ecosystem.config.js --update-env || pm2 start ecosystem.config.js

      - name: Validation
        run: |
          set -e
          echo "PM2 process list:"
          pm2 list

          echo "Recent logs:"
          pm2 logs --lines 50 --nostream